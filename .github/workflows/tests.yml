name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Verify serverInfo identity
        run: |
          python -c "
          from negotiate_mcp import server, __version__
          assert server.mcp.name == 'negotiate-mcp', f'wrong name: {server.mcp.name}'
          assert server.mcp._mcp_server.version == __version__, \
              f'version mismatch: {server.mcp._mcp_server.version} != {__version__}'
          print(f'serverInfo OK: name={server.mcp.name} version={server.mcp._mcp_server.version}')
          "
