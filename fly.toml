app = 'negotiate-mcp'
primary_region = 'ord'

[env]
  ALLOWED_HOSTS = 'mcp.pier39.ai,negotiate-mcp.fly.dev,127.0.0.1,localhost'
  HOST = '0.0.0.0'
  MCP_TRANSPORT = 'streamable-http'
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2048mb'
