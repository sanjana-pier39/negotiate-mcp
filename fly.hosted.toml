# fly.hosted.toml — dedicated "authorized-sources-only" connector instance for
# the ChatGPT / OpenAI Apps submission.
#
# Same code and image as the main `negotiate-mcp` app. The ONLY behavioral
# difference is NASH_AUTHORIZED_SOURCES_ONLY=1, which restricts EVERY request to
# authorized product sources — each store's own published catalog (Shopify
# /products.json, genuine merchant nash.v1 endpoints). The SerpApi/Rainforest
# breadth paths and Nash's hand-built curated catalogs are suppressed for
# user-facing data (SerpApi stays available only as an internal price signal).
#
# Point the ChatGPT app at:  https://<PUBLIC_HOST>/mcp
#
# NOTE: the main app's original fly.toml was never committed. Before relying on
# this, run `fly config save --app negotiate-mcp` and reconcile the service /
# health / VM settings below with whatever the live main app actually uses —
# only `app` and the `NASH_AUTHORIZED_SOURCES_ONLY` env should differ.

app = "negotiate-mcp-hosted"
primary_region = "iad"   # <-- match your main app's region (fly config save)

[build]
  dockerfile = "Dockerfile"

[env]
  MCP_TRANSPORT = "streamable-http"
  HOST = "0.0.0.0"
  PORT = "8000"
  # THE switch that makes this instance authorized-only for all traffic:
  NASH_AUTHORIZED_SOURCES_ONLY = "1"
  NASH_CHECKOUT_URL = "https://nash-checkout.pier39.ai"
  # Must equal the hostname the ChatGPT app connects to (used by the OAuth
  # resource-metadata). If you use the default Fly domain, leave as-is; if you
  # attach a custom domain, set it here (e.g. "mcp-hosted.pier39.ai").
  PUBLIC_HOST = "negotiate-mcp-hosted.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  # Keep one machine warm so the reviewer's first tool call doesn't cold-start.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"   # registry parse (~36k stores) is memory-hungry; match main app
